<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="loupe.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Formular</title>
</head>

<body>
    <div class="main">
        <header>
            <div class="header-content" id="header-item">
                <div class="logo">
                    <img src="logo.png" alt="logo" class="logo-img">
                </div>
                <div class="nav">
                    <ul class="nav-content">
                        <li class="nav-item"><a href="../MyWebsite/index.html">Home</a></li>
                        <li class="nav-item"><a href="">Blog</a></li>
                        <li class="nav-item"><a href="">Service</a></li>
                        <li class="nav-item"><a href="">About</a></li>
                    </ul>
                </div>
                <div class="Sign-in-out">
                    <p>
                        <a href=""><input type="submit"  value="Sign in" class="sign-in"></a>
                        <input type="submit" value="Sign out" class="sign-out">
                    </p>
                </div>
            </div>
        </header>
        <div class="menu">
            <p class="login">Have an account?
                <a href="#">Login</a>
            </p>
            <h1>Sign Up</h1>
            <form action="#" method="post" id="formulaire">
                <p>
                <div>
                    <input type="text" name="firstname" id="first-name" placeholder="Firstname">
                    <input type="text" name="lastname" id="last-name" placeholder="Lastname"><br>
                </div>
                <div id="long-input">
                    <input type="email" name="email" id="email" placeholder="Email"><br>
                    <input type="password" name="password" id="password" placeholder="Password"><br>
                    <input type="submit" value="Register" id="register"><br>
                </div>
                <div class="bottom-form">
                    <input type="checkbox" name="Remember me" id="box" title="Remember Me">
                    <label for="box">Remember Me</label>
                    <p>Terms & conditions</p>
                </div>
                </p>
            </form>
        </div>
    </div>

</body>

</html>
